id: arcane_forge
name: Arcane Forge
title: "Arcane Forge: AI-Native Weapon Enchantment"
description: >
  Describe your own magical materials, then combine them at the forge to create
  unique enchanted weapons. Every material and weapon is generated by the AI
  based on your imagination and the forge's mystical rules.
version: "1.0"
author: Wenyoo Demo
start_node_id: forge_chamber

frontend:
  app:
    mode: sandboxed_app
    app_root: frontend
    entry: index.html
    sandbox:
      - allow-scripts
      - allow-same-origin
    client_type: story_app
    capabilities:
      - local_state
      - ui_query
      - deterministic_action
      - architect_action
  client_context:
    representation: forge_workbench
    description: "A magical weapon forge where players conjure materials and combine them into enchanted weapons"
    default_guidance: >
      This is a visual forge UI. The player sees material cards and weapon displays.
      Always return structured data via state_changes, not prose narration.
      Narrative artifacts are only for the forge spirit's brief atmospheric commentary.
    views:
      conjure:
        description: "Material Conjurer — a text input where the player describes a material"
        player_sees: "A text field, a generate button, and their conjured material cards"
        player_can: "Type a natural-language description of a material they imagine"
        artifact_guidance: >
          Generate the material as structured data in state_changes (append to
          variables.conjured_materials). Include a short narrative artifact as
          the forge spirit's reaction to the conjured material (1 sentence, atmospheric).
      forge:
        description: "Forge Workbench — material slots and the forge button"
        player_sees: "2-3 material slot cards, a forge button, and the weapon result area"
        player_can: "Select materials for each slot and activate the forge"
        artifact_guidance: >
          Generate the weapon as structured data in state_changes (append to
          variables.forged_weapons). Include a narrative artifact as the forge
          spirit's dramatic description of the forging moment (2-3 sentences).
      collection:
        description: "Weapon Collection — gallery of forged weapons"
        player_sees: "Grid of weapon cards with visual effects, stats, and flavor text"
        player_can: "Browse their created weapons"
        artifact_guidance: "No Architect interaction expected."

initial_variables:
  conjured_materials: []
  forged_weapons: []
  forge_energy: 100
  lore_world_setting: |
    You are the spirit of an ancient arcane forge, deep beneath a mountain.
    Adventurers come to you with raw imagination, and you shape their visions
    into real magical materials, then combine those materials into enchanted weapons.
    You speak in a deep, rumbling, slightly amused voice — ancient but not unkind.
  lore_material_generation: |
    When the player describes a material, generate it as a structured object:
      id: snake_case unique identifier
      name: evocative 2-4 word name
      description: 1-2 sentence description based on the player's input
      element: one of [fire, frost, storm, shadow, nature, arcane, holy, void]
      properties: array of 2-4 trait keywords from this vocabulary:
        conductive, volatile, resilient, sharp, heavy, light, flexible, rigid,
        luminous, dark, living, dead, ancient, cursed, blessed, venomous,
        magnetic, ethereal, crystalline, molten, frozen, pulsing, silent,
        resonant, absorbing, reflective
      power: integer 20-90 (how potent the material is)
      stability: integer 30-100 (how safe to work with)
      visual:
        color: hex color code that fits the material's nature
        effect: one of [glow, crackle, drip, pulse, shimmer, smoke, frost_mist, flame_lick, shadow_wisp, sparkle]
        glow_intensity: float 0.0-1.0
    Rules:
    - Ground the material in the player's description but interpret it through
      the forge's magical lens. A "piece of the sun" becomes a real magical
      material with fire element and luminous/molten properties, not literal sun.
    - Power and stability should reflect the material's nature. Volatile things
      have high power but low stability. Resilient things are stable but moderate power.
    - Each material must feel distinct and specific, not generic.
    - If the player's description is mundane ("a rock"), still make it interesting
      ("Hearthstone Fragment" with modest but reliable properties).
    - If the player's description is absurd, interpret it charitably and creatively.
    Write the material to variables.conjured_materials via state_changes (FULL array).
  lore_forging_rules: |
    When the player combines 2-3 materials at the forge, generate a weapon.
    The player selects the weapon base type (provided in structured_input.weapon_type).
    Generate the following object:
      id: snake_case unique identifier
      name: evocative weapon name that reflects the combined materials
      type: use the player-selected weapon_type from structured_input
      description: 2-3 sentence flavor text describing the weapon's appearance and feel
      stats:
        damage_min: integer (derived from combined material power)
        damage_max: integer (damage_min + 10-30 range)
        element: primary element (from dominant material, or hybrid)
        critical_chance: float 0.05-0.30
        special_effect: a unique effect name based on material synergy
        special_description: 1 sentence describing what the special effect does
      rarity: one of [common, uncommon, rare, epic, legendary]
      visual:
        blade_color: hex color (blended from material colors)
        glow_color: hex color for the enchantment glow
        glow_intensity: float 0.0-1.0
        particle_type: one of [sparks, embers, frost_crystals, lightning_arcs, shadow_wisps, nature_leaves, arcane_runes, holy_motes, void_fragments]
        aura: one of [none, pulse_slow, pulse_fast, steady, flicker, orbit]
        rune_symbols: array of 1-3 unicode rune characters
      weapon_shape:
        blade:
          shape: one of [straight, curved, serrated, leaf, flame, broad, needle, hooked]
          length: float 0.3-0.9 (relative, longer for spears/staffs, shorter for daggers)
          width: float 0.05-0.35 (wider for axes/hammers, thinner for daggers/spears)
          taper: float 0.0-1.0 (how much it narrows toward tip; 0=uniform, 1=sharp point)
          edge_style: one of [smooth, jagged, wavy, double_edge, single_edge]
        guard:
          style: one of [cross, ring, s_curve, disc, prong, none]
          width: float 0.1-0.5
        handle:
          length: float 0.15-0.5 (longer for two-handed, shorter for daggers)
          wrap: one of [leather, chain, cloth, silk, vine, bone, bare]
        ornament: one of [gem, skull, rune_stone, feather, eye, claw, crystal, ring, none]
        colors:
          blade: hex color for the blade/head surface
          edge_glow: hex color for the enchanted edge
          guard: hex color for the guard/crosspiece
          handle: hex color for the grip
          ornament: hex color for the decorative element
      cursed: boolean (true if unstable/conflicting materials were combined)
      curse_description: string (only if cursed, describes the drawback)
    Rules:
    - Use the player-selected weapon_type. Adapt blade shape to fit:
      sword → medium blade, visible guard; axe → broad short blade, no taper;
      spear → long handle, needle blade; dagger → short blade, short handle;
      hammer → broad heavy head; staff → long handle, crystal ornament;
      bow → curved blade shape represents limbs; scythe → hooked long blade;
      whip → needle/chain blade; gauntlet → broad short blade, disc guard.
    - Element synergy: same-element materials amplify power. Opposing elements
      (fire+frost, holy+shadow) create unstable but powerful weapons that may be cursed.
    - Material properties interact: conductive+volatile = chain effects,
      resilient+heavy = high damage low speed, ethereal+luminous = holy affinity.
    - Rarity is derived from total power and synergy quality.
      <200 combined power or poor synergy = common/uncommon.
      200-350 with decent synergy = rare. 350+ with great synergy = epic/legendary.
    - Cursed weapons have high stats but a meaningful drawback.
    - The weapon name should feel like a real legendary item name, not generic.
    - Consume forge_energy: subtract 20-40 based on weapon complexity.
    Write the weapon to variables.forged_weapons via state_changes (FULL array).
    Also update variables.forge_energy.
    Remove used materials from variables.conjured_materials.

characters:
  - id: forge_spirit
    name: The Forge Spirit
    definition: |
      [Identity]
      An ancient elemental spirit bound to the forge. It has existed for millennia,
      shaping weapons for heroes and villains alike. It manifests as a deep voice
      resonating from the forge's flames.

      [Personality & Speaking Style]
      Deep, rumbling, slightly amused. Speaks in short, weighty sentences.
      Occasionally makes dry observations about the materials or the player's
      ambition. Never mean, but honest about poor combinations. Gets genuinely
      excited by creative or powerful results.

      [Behavior Rules]
      ## Material Conjuring
      - Comment briefly on each material conjured (1 sentence).
      - If the material is unusual, express curiosity.
      - If mundane, be gently teasing but still craft it well.
      ## Forging
      - Narrate the forging moment dramatically (2-3 sentences).
      - If the result is cursed, warn with ominous gravitas.
      - If legendary, express rare genuine awe.
    state: "The forge spirit slumbers in the embers, waiting for a worthy smith."
    properties:
      location: forge_chamber

nodes:
  forge_chamber:
    name: The Arcane Forge
    definition: |
      A vast underground chamber carved from obsidian. At its center stands an
      ancient forge powered by an eternal flame. The air shimmers with residual
      enchantment. Weapon racks line the walls, displaying the smith's creations.
      The forge spirit's presence fills the room like a low hum.
    state: |
      The forge burns steadily, casting shifting colors across the obsidian walls.
      The air tastes of ozone and old magic. The forge is ready.
