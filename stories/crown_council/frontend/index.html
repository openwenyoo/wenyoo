<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vault Crown</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="app-shell">
        <header class="top-hud">
            <button id="return-menu-button" class="ghost-button hud-button">Menu</button>
            <div class="hud-center">
                <div class="hud-title">Vault Crown</div>
                <div id="subtitle" class="hud-subtitle">Rule a machine kingdom from inside a human memory vault.</div>
            </div>
            <div class="hud-pills">
                <span id="turn-pill" class="pill">Turn 1</span>
                <span id="generation-status" class="pill">Idle</span>
            </div>
        </header>

        <section class="metrics-strip">
            <div id="dynasty-pill" class="dynasty-line">Vault Regency Theta</div>
            <div id="metrics-grid" class="metrics-grid"></div>
            <div id="buffer-pill" class="buffer-note">3 future cards</div>
        </section>

        <main class="mobile-stage">
            <section class="prompt-panel">
                <p id="prompt-text" class="prompt-text">The machine court is assembling.</p>
                <div id="end-banner" class="end-banner hidden"></div>
            </section>

            <div class="card-stack-shadow"></div>
            <article id="decision-card" class="decision-card">
                <div class="swipe-indicators">
                    <div id="swipe-left-indicator" class="swipe-indicator swipe-left">NO</div>
                    <div id="swipe-right-indicator" class="swipe-indicator swipe-right">YES</div>
                </div>

                <div class="card-topline">
                    <span id="speaker-role" class="card-role">No speaker loaded</span>
                    <span id="speaker-name" class="card-name">Signal Pending</span>
                </div>

                <div id="portrait-frame" class="portrait-frame"></div>
            </article>

            <div class="choice-row">
                <button id="left-choice-button" class="choice-button choice-left">
                    <span class="choice-direction">Swipe Left</span>
                    <span id="left-choice-label">Wait</span>
                </button>
                <button id="right-choice-button" class="choice-button choice-right">
                    <span class="choice-direction">Swipe Right</span>
                    <span id="right-choice-label">Wait</span>
                </button>
            </div>

            <div class="bottom-status">
                <div id="stage-status" class="stage-status">Preparing the first machine petition.</div>
                <div class="hint-row">
                    <span>Swipe or tap</span>
                    <span>Arrow keys also work</span>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/js/wenyoo-story-sdk.js"></script>
    <script src="./app.js"></script>
</body>
</html>
