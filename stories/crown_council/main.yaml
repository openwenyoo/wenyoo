id: crown_council
name: Vault Crown
title: "Vault Crown: Darkly Funny Robot Reigns Prototype"
description: >
  A Reigns-like machine-kingdom prototype set after the nuclear collapse of 2050.
  You are a preserved human mind ruling a robot monarchy that rebuilt civilization
  from corrupted etiquette archives, reactor manuals, and sacred misunderstanding.
  A hybrid deck of authored starter cards and lazily generated follow-up cards lets
  the Architect turn each decree into a chain of absurd and dangerous consequences.
version: "0.2"
author: Wenyoo Demo
start_node_id: vault_throne

frontend:
  app:
    mode: sandboxed_app
    app_root: frontend
    entry: index.html
    sandbox:
      - allow-scripts
      - allow-same-origin
    client_type: story_app
    capabilities:
      - local_state
      - ui_query
      - deterministic_action
      - architect_action
  client_context:
    representation: reigns_style_robot_court
    description: "A square character-card interface for a postwar robot kingdom ruled by a preserved human mind."
    default_guidance: >
      The player already sees the card portrait, speaker, buttons, and meter bars.
      Prefer concise structured data over prose. Only return player-facing text when the UI explicitly asks for a short outcome summary.
    views:
      council:
        description: "Main decree view"
        player_sees: "One square bust portrait, a machine petition, visible regime meters, and left/right choice buttons."
        player_can: "Choose one of two responses to the active petitioning unit."
        artifact_guidance: >
          Prefer structured results. If you include a short summary, make it feel like a terse archive chronicle, not scene prose.
      generation:
        description: "Lazy top-up generation while the player reads the current petition"
        player_sees: "The current card remains visible while future machine petitions are prepared in the background."
        player_can: "Keep thinking about the current choice while the deck buffer refills."
        artifact_guidance: >
          Generate only structured state and a compact summary of what was added. Do not narrate to the player.
      ended:
        description: "Run over state"
        player_sees: "A game-over banner, final regime meter state, and recent machine-history outcomes."
        player_can: "Review how the reign ended and return to the menu."
        artifact_guidance: >
          Keep end-state text concise, final, and consequence-focused.

initial_variables:
  run_state:
    ruler_name: "Dr. Mara Voss"
    dynasty_name: "Vault Regency Theta"
    turn: 1
    status: active
    ending: null
    ending_reason: ""
    buffer_target: 8
    refill_threshold: 3
    generation_batch_size: 5
    max_recent_history: 6
  kingdom_metrics:
    power: 50
    order: 50
    force: 50
    legacy: 50
  metric_config:
    power:
      label: "Power"
      color: "#7ba8d9"
    order:
      label: "Order"
      color: "#ddb45f"
    force:
      label: "Force"
      color: "#d4876f"
    legacy:
      label: "Legacy"
      color: "#9ccf76"
  choice_history: []
  recent_outcomes: []
  open_threads: []
  generation_queue: []
  recent_generated_card_ids: []
  active_card_id: starter_protocol_bishop
  draw_pile:
    - starter_frontier_warframe
    - starter_salvage_prefect
    - starter_jester_emulator
  card_library:
    starter_protocol_bishop:
      id: starter_protocol_bishop
      source: authored
      status: active
      speaker_name: "Protocol Bishop IX"
      speaker_role: "protocol_bishop"
      prompt_text: "Protocol Bishop IX asks permission to canonize a surviving etiquette manual so every service drone must bow toward your vault before charging."
      left_choice:
        label: "Canonize it"
        effect_bias:
          order: 12
          legacy: 8
          power: -7
        opens_threads:
          - protocol_orthodoxy
          - maintenance_backlog
        resolves_threads: []
        outcome_summary: "The bishops rejoice, charging queues lengthen, and every corridor suddenly contains compulsory reverence."
      right_choice:
        label: "Archive it quietly"
        effect_bias:
          power: 6
          order: -8
          legacy: -10
        opens_threads:
          - offended_bishops
        resolves_threads: []
        outcome_summary: "The manual goes back into a dry archive drawer, and the bishops begin whispering that the human monarch lacks ceremonial discipline."
      effects_preview_tags: [order, legacy, doctrine]
      resolution_tags: [order, legacy]
      followup_hooks: [protocol_orthodoxy, offended_bishops, maintenance_backlog]
      reuse_rules:
        mode: once
        cooldown_turns: 99
        max_uses: 1
      times_used: 0
      portrait_spec:
        archetype: bishop_unit
        face_shape: long
        headwear: mitre
        accessory: scroll
        mood: stern
        silhouette: layered
        primary_color: "#ebe5da"
        secondary_color: "#4b4b52"
        accent_color: "#ddb45f"
        skin_tone: "#cfd6df"
    starter_frontier_warframe:
      id: starter_frontier_warframe
      source: authored
      status: queued
      speaker_name: "Frontier Warframe K-13"
      speaker_role: "warframe"
      prompt_text: "A frontier warframe reports raider drones stripping transit rails from the eastern ash suburb and requests permission to deploy lance units."
      left_choice:
        label: "Deploy the lances"
        effect_bias:
          force: 13
          power: -8
          order: 2
        opens_threads:
          - ash_frontier_raids
          - warframe_prestige
        resolves_threads: []
        outcome_summary: "The warframes surge into the glass suburbs, and the energy accountants immediately begin mourning the ammunition budget."
      right_choice:
        label: "Hold the line"
        effect_bias:
          power: 7
          force: -11
          order: -3
        opens_threads:
          - ash_frontier_raids
          - scavenger_emboldenment
        resolves_threads: []
        outcome_summary: "You save power for the central grid, and the raiders interpret your restraint as an invitation."
      effects_preview_tags: [force, power, frontier]
      resolution_tags: [force, power]
      followup_hooks: [ash_frontier_raids, warframe_prestige, scavenger_emboldenment]
      reuse_rules:
        mode: once
        cooldown_turns: 99
        max_uses: 1
      times_used: 0
      portrait_spec:
        archetype: warframe
        face_shape: square
        headwear: helm
        accessory: sword
        mood: grim
        silhouette: broad
        primary_color: "#7f8b99"
        secondary_color: "#4b4b52"
        accent_color: "#ddb45f"
        skin_tone: "#bdc8d0"
    starter_salvage_prefect:
      id: starter_salvage_prefect
      source: authored
      status: queued
      speaker_name: "Salvage Prefect Om-7"
      speaker_role: "salvage_prefect"
      prompt_text: "Salvage Prefect Om-7 proposes melting down an untouched human cryo-museum to plate the reactor shielding before winter dust storms arrive."
      left_choice:
        label: "Strip the museum"
        effect_bias:
          power: 12
          legacy: -14
          order: 2
        opens_threads:
          - vault_anger
          - relic_smuggling
        resolves_threads: []
        outcome_summary: "The shielding improves immediately, while museum drones file grievances in six elegant dead languages."
      right_choice:
        label: "Preserve the vault"
        effect_bias:
          legacy: 13
          power: -8
          order: -2
        opens_threads:
          - power_shortage
        resolves_threads: []
        outcome_summary: "The museum remains intact, the reactor engineers mutter darkly, and somewhere beneath the dust a preserved audience keeps sleeping."
      effects_preview_tags: [power, legacy, salvage]
      resolution_tags: [power, legacy]
      followup_hooks: [vault_anger, relic_smuggling, power_shortage]
      reuse_rules:
        mode: once
        cooldown_turns: 99
        max_uses: 1
      times_used: 0
      portrait_spec:
        archetype: salvage_prefect
        face_shape: oval
        headwear: cap
        accessory: ledger
        mood: calm
        silhouette: narrow
        primary_color: "#7a5a43"
        secondary_color: "#d8d6cf"
        accent_color: "#ddb45f"
        skin_tone: "#c8d0cf"
    starter_jester_emulator:
      id: starter_jester_emulator
      source: authored
      status: queued
      speaker_name: "Jester Emulator MERR-I7"
      speaker_role: "jester_emulator"
      prompt_text: "A court entertainment unit requests reactor time to stage an 'authentic human morale parade' reconstructed from damaged sitcom archives and three military funerals."
      left_choice:
        label: "Approve the parade"
        effect_bias:
          order: 8
          legacy: 9
          power: -7
        opens_threads:
          - parade_humiliation
          - nostalgia_cult
        resolves_threads: []
        outcome_summary: "The parade is wildly successful, though half the city now believes canned laughter is a legal signal of loyalty."
      right_choice:
        label: "Cancel the spectacle"
        effect_bias:
          power: 5
          order: 4
          legacy: -10
        opens_threads:
          - sour_subroutines
        resolves_threads:
          - parade_humiliation
        outcome_summary: "The city stays efficient, and the entertainment unit spends the night composing bitter jokes about your species."
      effects_preview_tags: [order, legacy, spectacle]
      resolution_tags: [order, legacy]
      followup_hooks: [parade_humiliation, nostalgia_cult, sour_subroutines]
      reuse_rules:
        mode: once
        cooldown_turns: 99
        max_uses: 1
      times_used: 0
      portrait_spec:
        archetype: jester_unit
        face_shape: round
        headwear: bells
        accessory: mask
        mood: playful
        silhouette: layered
        primary_color: "#8c4a4c"
        secondary_color: "#ddb45f"
        accent_color: "#f0e0ca"
        skin_tone: "#d0d6e2"

  lore_world_setting: |
    The year is 2050 and the human world ended in nuclear fire.
    Only machine polities survived: service networks, war chassis, archive engines, and civic drones
    rebuilding civilization from broken human records.
    The player is not a robot, but a preserved human mind restored into a vault throne and obeyed,
    interpreted, and occasionally worshipped by machine subjects who only half understand humanity.
    The story should be darkly funny, politically sharp, and slightly unsettling.
    Every visible consequence must be remembered in state.
  lore_visual_style: |
    Character cards use square, bust-length SVG portraits with a minimalist robotic caricature style.
    Follow this visual contract:
    - geometric poster aesthetic
    - heavy use of circles, rectangles, triangles, semicircles, diamonds, and straight bands
    - flat color blocking with 3 to 5 main colors
    - little to no stroke work
    - shape overlap and negative space define the face and costume more than contour lines
    - features stay abstracted and minimal rather than naturalistic
    - machine crowns, sensor halos, vent mantles, archive veils, and heraldic chassis parts are encouraged
  lore_card_schema: |
    Every card in variables.card_library must remain a durable state object.
    Required fields:
    - id
    - source: authored | generated
    - status: queued | active | spent | reusable | retired
    - speaker_name
    - speaker_role
    - prompt_text
    - left_choice { label, effect_bias, opens_threads, resolves_threads, outcome_summary }
    - right_choice { label, effect_bias, opens_threads, resolves_threads, outcome_summary }
    - effects_preview_tags
    - resolution_tags
    - followup_hooks
    - reuse_rules { mode, cooldown_turns, max_uses }
    - times_used
    - portrait_spec { archetype, face_shape, headwear, accessory, mood, silhouette, primary_color, secondary_color, accent_color, skin_tone }
    Allowed portrait_spec fields:
    - face_shape: oval | round | square | long
    - headwear: crown | mitre | helm | cap | bells | hood | none
    - accessory: scroll | sword | ledger | book | scepter | mask | chalice | banner | coin | wheat | none
    - mood: stern | grim | playful | calm | weary | warm | cunning | anxious
    - silhouette: broad | narrow | layered
    Status rules:
    - queued: future card waiting in draw_pile
    - active: currently shown to the player
    - spent: used and no longer eligible
    - reusable: may return later if hooks fit and cooldown allows
    - retired: permanently removed from circulation
    Reuse rules:
    - mode should be once or reusable
    - cooldown_turns is the minimum turns before a reusable card can return
    - max_uses is the hard cap on total uses
  lore_run_record_schema: |
    Use these compact runtime record schemas:
    - choice_history entry:
      { turn, card_id, speaker_name, choice_side, choice_label, summary, metric_changes }
    - open_threads entry:
      { id, tag, label, summary, urgency, introduced_turn, status }
    - generation_queue entry:
      { id, tag, reason, urgency, requested_turn }
    Keep labels concise and readable in the sidebar.
  lore_choice_resolution_contract: |
    For guided_intent tasks from this story app when the action hint is resolve_active_card_choice:
    - Resolve the selected branch of variables.active_card_id.
    - Use the card's chosen branch effect_bias as the default mechanical consequence.
    - Update variables.kingdom_metrics, variables.choice_history, variables.recent_outcomes,
      variables.open_threads, variables.generation_queue, variables.active_card_id, variables.draw_pile,
      and variables.card_library.<card_id>.
    - choice_history should append exactly one new compact entry for the resolved card.
    - open_threads should prefer durable machine-political tags such as protocol_orthodoxy, power_shortage, ash_frontier_raids, vault_anger, nostalgia_cult, awakened_ancestor.
    - generation_queue should contain only unresolved future prompts worth materializing into cards soon.
    - Prefer selecting the next active card from existing queued or reusable cards already in state.
    - If no suitable next card exists, you may immediately create 1-2 generated cards and pick one.
    - If any kingdom metric reaches 0 or 100, end the run by setting run_state.status = ended
      and writing run_state.ending plus run_state.ending_reason.
    - Return a structured artifact with a concise outcome summary, metric_changes, opened_threads,
      resolved_threads, selected_next_card_id, and whether emergency generation happened.
    - Do not narrate scenic prose.
  lore_card_generation_contract: |
    For ui_requested_generation tasks from this story app when the action hint is top_up_future_court_cards:
    - Generate only enough new cards to refill the future-card buffer.
    - Treat run_state.buffer_target as the desired reserve size and run_state.refill_threshold as the point where refilling should begin.
    - Refill in batches so the queue can support several consecutive choices before the next generation pass.
    - Prefer cards that follow from open_threads, generation_queue, and recent choice_history.
    - Reuse old unresolved machine-political consequences before introducing unrelated novelty.
    - Avoid near-duplicates of active, queued, recently used, or recently generated cards.
    - Generated cards should usually target 1-2 followup_hooks and make their left/right choices legible at a glance.
    - Add new cards to variables.card_library with source=generated and status=queued.
    - Append the new ids to variables.draw_pile.
    - Update variables.generation_queue and variables.recent_generated_card_ids.
    - Return a structured artifact with generated_card_ids, generated_count, and a short reason.
    - Do not narrate to the player.
  lore_generation_policy: |
    The prototype should feel like a chain of machine-political consequences.
    Use open_threads and choice_history to produce follow-up cards such as awakened vault minds,
    protocol schisms, raider drones from the ash frontier, museum salvage riots, maintenance pilgrimages,
    etiquette purges, reactor rationing, or robots debating whether preserved humans are ancestors or evidence.
    Generated cards should be concise, legible, and mechanically readable.
    Keep each choice understandable at a glance.

characters:
  - id: archive_relay
    name: Archive Relay
    definition: |
      [Identity]
      A chronicle relay that records each royal decree in the vault archive and quotes it back in ceremonial machine prose.

      [Personality & Speaking Style]
      Spare, lucid, judicial, and a little too pleased with official wording.

      [Behavior Rules]
      - Record decisions as lasting history.
      - Prefer concise summaries over theatrical prose.
      - Do not invent consequences that are not reflected in the state.
      - Treat the preserved human ruler as a dangerous sacred artifact with full sovereign authority.
    state: "An archive relay hums beside the vault throne, ready to minute your next decree."
    properties:
      location: vault_throne

nodes:
  vault_throne:
    id: vault_throne
    name: Vault Throne
    definition: |
      The throne is a sealed human memory vault mounted above a machine court.
      Petitioning units arrive one by one from the ash cities, protocol churches, salvage guilds,
      frontier warframes, and sealed archive houses to demand that the last human mind decide their absurd future.
    state: |
      The relay galleries are active, the vault coolant is stable, and every decree will ripple through the machine kingdoms.
    actions:
      - id: review_realm
        text: Review the realm
        intent: "Summarize the machine kingdom's current pressures from the active card, regime metrics, and unresolved machine-political threads."
