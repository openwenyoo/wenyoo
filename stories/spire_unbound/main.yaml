        - {id: "sc_s3", name: "Zap", type: "attack", rarity: "basic", cost: 1, description: "Deal 6 damage.", effects: [{type: "damage", value: 6}], svg_effect: {layers: [{type: "projectile", shape: "bolt", trail: "sparks", color: "#84c4fc", timing: {start_ms: 0, duration_ms: 200}}, {type: "impact", shape: "shockwave_ring", spread: 38, color: "#2f7abe", timing: {start_ms: 180, duration_ms: 210}}], target: "single", total_duration_ms: 390}}
