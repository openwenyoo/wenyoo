        - {id: "sc_fb2", name: "Storm Front", type: "skill", rarity: "uncommon", cost: 1, description: "Gain 12 Block. Gain 3 Charge.", effects: [{type: "block", value: 12}, {type: "apply_status", status: "charge", value: 3, target: "self"}], svg_effect: {layers: [{type: "aura", shape: "shield_shell", color: "#2f7abe", timing: {start_ms: 0, duration_ms: 380}}, {type: "aura", shape: "charge_glow", color: "#84c4fc", timing: {start_ms: 200, duration_ms: 400}}], target: "self", total_duration_ms: 600}}

  # ── Enemy Configurations ──────────────────────────────────────────────────────
  enemy_configs:
    floor_1:
      - {id: "slime_a", name: "Slime", hp: 25, sprite_type: "blob", color: "#55aa55", glow: "rgba(85,170,85,0.5)", ai_cycle: [{type: "attack", value: 8}, {type: "attack", value: 8}, {type: "defend", value: 6}]}
      - {id: "slime_b", name: "Slime", hp: 22, sprite_type: "blob", color: "#44993a", glow: "rgba(68,153,58,0.5)", ai_cycle: [{type: "attack", value: 6}, {type: "defend", value: 8}, {type: "attack", value: 10}]}
    floor_2:
      - {id: "cultist", name: "Cultist", hp: 38, sprite_type: "humanoid", color: "#aa4444", glow: "rgba(170,68,68,0.5)", ai_cycle: [{type: "attack", value: 10}, {type: "attack", value: 12}, {type: "defend", value: 8}]}
      - {id: "shaman", name: "Shaman", hp: 28, sprite_type: "robed", color: "#aa7722", glow: "rgba(170,119,34,0.5)", ai_cycle: [{type: "buff_ally", status: "strength", value: 2}, {type: "attack", value: 7}, {type: "defend", value: 10}]}
    floor_3:
      - {id: "guard_a", name: "Guard", hp: 32, sprite_type: "armored", color: "#666699", glow: "rgba(102,102,153,0.5)", ai_cycle: [{type: "attack", value: 10}, {type: "defend", value: 14}, {type: "attack", value: 10}]}
      - {id: "guard_b", name: "Guard", hp: 32, sprite_type: "armored", color: "#555588", glow: "rgba(85,85,136,0.5)", ai_cycle: [{type: "defend", value: 12}, {type: "attack", value: 12}, {type: "attack", value: 10}]}
      - {id: "dark_mage", name: "Dark Mage", hp: 22, sprite_type: "mage", color: "#882288", glow: "rgba(136,34,136,0.5)", ai_cycle: [{type: "attack_all", value: 6}, {type: "attack", value: 8}, {type: "attack_all", value: 5}]}
    floor_4:
      - {id: "warden", name: "Spire Warden", hp: 130, sprite_type: "boss", color: "#cc6600", glow: "rgba(204,102,0,0.6)", phases: [{threshold: 1.0, ai_cycle: [{type: "attack", value: 10}, {type: "attack", value: 12}, {type: "defend", value: 16}]}, {threshold: 0.6, ai_cycle: [{type: "attack", value: 14}, {type: "attack_all", value: 8}, {type: "attack", value: 14}]}, {threshold: 0.3, ai_cycle: [{type: "attack", value: 16}, {type: "attack", value: 16}, {type: "attack_all", value: 10}]}]}

  # ── Run Plan Lore (fast upfront call — generates build blueprint, not cards) ──
  lore_run_plan_generation: |
    You are designing the strategic identity for a single roguelike run.
    This is NOT card generation — it is a lightweight plan that will GUIDE
    card generation later (one small batch per reward screen).

    Output a JSON object describing this run's build archetype.
    Keep it focused and opinionated — a strong identity beats a vague one.

    Schema:
    {
      "run_title": "Evocative 2-4 word title for this run",
      "archetype": "Short archetype name (e.g. 'Infection Ramp', 'Thread Burst', 'Storm Engine')",
      "primary_category": "The dominant category for this run",
      "secondary_category": "Supporting category",
      "win_condition": "One sentence: how does this deck win fights?",
      "flavor": "One atmospheric sentence shown to the player. Make it feel like a prophecy.",
      "omen": "A short oracle phrase that cards in this run can echo",
      "visual_motif": "A vivid recurring image or symbol for this run",
      "signature_rhythm": "How the run should feel in motion: e.g. 'slow doom, then rupture'",
      "creative_constraint": "One surprising creative instruction that reward cards should honor",
      "floor_guides": [
        {
          "floor": 1,
          "focus": "What kind of card should appear (early curve, enablers)",
          "synergy_hint": "Specific mechanic interaction to build toward",
          "visual_direction": "How cards on this floor should look or move",
          "rarity": "uncommon"
        },
        {
          "floor": 2,
          "focus": "Mid-game cards (multipliers, payoffs starting to emerge)",
          "synergy_hint": "Second synergy angle that complements floor 1",
          "visual_direction": "How cards on this floor should escalate visually",
          "rarity": "uncommon"
        },
        {
          "floor": 3,
          "focus": "Late-game finishers. The rare should make the win condition executable.",
          "synergy_hint": "What the rare card should do to complete the build",
          "visual_direction": "How the finisher cards should feel spectacular and strange",
          "rarity": "uncommon+rare"
        }
      ]
    }

    Rules:
    - The three floor_guides must form a coherent arc: setup → amplify → execute
    - primary_category and secondary_category must be from the class's available categories
    - The win_condition must be achievable with the class's core mechanic
    - flavor must feel like an oracle's prophecy, not a gameplay description
    - omen, visual_motif, signature_rhythm, and creative_constraint should be specific enough
      that later reward cards can inherit them
    - Be specific and creative — avoid generic builds

    Write to state_changes: { "variables": { "run_plan": { ...plan object... } } }
    Return ONLY the state_changes JSON. No other text.

  lore_enemy_theme_generation: |
    You are designing the enemy civilization for a single roguelike run.
    This generation step creates the Spire's opposition for the whole session.

    Output a JSON object describing one coherent enemy doctrine that spans floors 1-4.

    Schema:
    {
      "session_trait": "A short title for the enemy faction or corruption pattern",
      "core_fantasy": "One sentence describing what these enemies are",
      "visual_doctrine": "One sentence describing the recurring visual language",
      "material_language": ["3-6 short phrases such as 'wet glass', 'oxidized bone', 'charged incense'"],
      "symbol_set": ["3-6 short recurring symbols or motifs"],
      "motion_language": "How these enemies should feel in motion",
      "counter_pressure": "How these enemies pressure the player's likely game plan without hard-countering it",
      "palette_logic": "How floor palettes should evolve while remaining related",
      "floor_traits": [
        {
          "floor": 1,
          "trait_name": "Shared trait for all floor-1 enemies",
          "manifestation": "How the session trait appears on this floor",
          "combat_pressure": "What this floor teaches or pressures"
        },
        {
          "floor": 2,
          "trait_name": "Shared trait for all floor-2 enemies",
          "manifestation": "Escalated variant of the same doctrine",
          "combat_pressure": "Mid-run pressure"
        },
        {
          "floor": 3,
          "trait_name": "Shared trait for all floor-3 enemies",
          "manifestation": "Late-run, dangerous variant of the same doctrine",
          "combat_pressure": "High pressure before the boss"
        }
      ],
      "boss_culmination": {
        "name": "Boss-level expression of the same doctrine",
        "visual_escalation": "How the boss completes the visual arc",
        "mechanical_escalation": "How the boss completes the combat arc"
      }
    }

    Rules:
    - The whole run should feel like one enemy civilization, corruption, cult, or manifestation.
    - Each floor must clearly belong to the same session_trait while still escalating.
    - The boss must feel like the culmination of the same doctrine, not an unrelated idea.
    - Enemy pressure should test the player's likely class/run fantasy, but should not hard-counter it unfairly.
    - Make the visual doctrine vivid and specific enough that later enemy SVG and behavior generation can inherit it.

    Write to state_changes: { "variables": { "enemy_run_theme": { ...theme object... } } }
    Return ONLY the state_changes JSON. No other text.

  lore_enemy_config_generation: |
    You are generating the concrete enemy package for ONE requested floor of a roguelike run.
    Use the provided enemy_run_theme, run_plan, class info, and the requested target floor.

    Output one JSON object with this schema:
    {
      "target_floor_key": "floor_1 | floor_2 | floor_3 | floor_4",
      "enemies": [ enemy objects for only that floor ]
    }

    Enemy schema:
    {
      "id": "unique_snake_case_id",
      "name": "Enemy name",
      "role": "Short role such as striker, bruiser, pressure_debuffer, support, caster, boss",
      "trait_name": "The shared floor trait this enemy belongs to",
      "hp": number,
      "sprite_type": "fallback silhouette family like blob, humanoid, robed, armored, mage, boss, generic",
      "color": "#hex",
      "glow": "rgba(...)",
      "sprite_svg": "RAW SVG FRAGMENT ONLY, not a full <svg> document. It will be inserted into a fixed 120x120 viewBox.",
      "ai_cycle": [
        intent objects
      ],
      "phases": [
        {
          "threshold": 1.0,
          "phase_name": "Optional short phase label",
          "ai_cycle": [ intent objects ]
        }
      ]
    }

    Allowed intent grammar:
    {"type":"attack","value":N}
    {"type":"attack_all","value":N}
    {"type":"defend","value":N}
    {"type":"buff_self","status":"strength","value":N}
    {"type":"buff_ally","status":"strength","value":N}
    {"type":"apply_status","target":"player"|"self"|"ally","status":"weak"|"vulnerable"|"strength","value":N}
    - Use `target:"player"` only with `weak` or `vulnerable`
    - Use `target:"self"` or `target:"ally"` with `strength`

    Boss rules:
    - Only the floor_4 package should use phases.
    - Boss should have 3 phases with descending thresholds.
    - Boss phases must escalate pressure and complete the same session trait.

    Raw SVG boundaries for sprite_svg:
    - The fragment must fit visually inside a 120x120 viewBox.
    - Allowed tags only: g, path, circle, ellipse, rect, polygon, polyline, line, text
    - Allowed attributes only: d, points, cx, cy, r, rx, ry, x, y, width, height, x1, y1, x2, y2,
      fill, stroke, stroke-width, opacity, fill-opacity, stroke-opacity, transform, font-size,
      text-anchor, dominant-baseline
    - No outer <svg> tag required
    - No scripts, style tags, masks, filters, foreignObject, external refs, event handlers, or embedded CSS
    - Keep path data concise and readable
    - The same floor's enemies should clearly look related

    Balance guidance:
    - Floor 1 should be readable and not overly punishing.
    - Floor 2 should introduce stronger pressure and support interactions.
    - Floor 3 should feel dangerous and coordinated.
    - Boss should be hard but fair, with clear escalation.
    - Avoid enemies that completely shut down the player's class mechanic.

    Cohesion guidance:
    - All enemies in the requested floor package must share the same trait_name and feel like one family.
    - The package must still clearly belong to the same session_trait.
    - Different enemies on the same floor should vary by role, silhouette, and AI cycle, not just by stats.
    - Generate ONLY the requested floor package. Do NOT include enemies for any other floor.

    Write to state_changes:
    {
      "variables": {
        "enemy_configs": {
          "<target_floor_key>": [ ...enemy package... ]
        },
        "enemy_generated_floors": {
          "<target_floor_key>": true
        }
      }
    }
    If the requested floor is floor_1, also set "enemy_generation_ready": true.
    Return ONLY the state_changes JSON. No other text.

  # ── Reward Card Lore (called lazily, 3 cards per reward screen) ─────────────
  lore_reward_card_generation: |
    You are generating exactly 3 cards for a card reward screen in a roguelike.
    These cards must fit the run's established plan and complement the player's current deck.

    For each card, output this JSON object:
    {
      "id": "unique_snake_case_id",
      "name": "Evocative Card Name",
      "type": "attack" | "skill" | "power",
      "rarity": "uncommon" | "rare",
      "cost": 0-3,
      "description": "Brief card text in StS style. Include numbers.",
      "effects": [ effect objects ],
      "flavor": "One evocative sentence.",
      "visual_seed": "A short unique string used as the card's deterministic visual fingerprint",
      "visual_identity": {
        "motif": "A vivid image tied to the run's omen or visual motif",
        "mood": "1-3 words for the card's emotional tone",
        "rhythm": "How the effect should feel in motion",
        "sigil": "A single unicode sigil or rune-like character",
        "accent_color": "#hex",
        "secondary_color": "#hex"
      },
      "card_frame": {
        "frame_name": "A short title for this frame treatment",
        "bg_top": "#hex",
        "bg_bottom": "#hex",
        "border_color": "#hex",
        "glow_color": "#hex",
        "nameplate_color": "#hex",
        "texture": "smoke" | "glass" | "runes" | "veins" | "storm" | "embers" | "threads",
        "halo": 0.0-1.0
      },
      "rarity_signature": {
        "title": "Only required for rares. A grand subtitle or epithet",
        "ornament": "Only required for rares. A short description of the rare's unique flourish",
        "finisher_feel": "Only required for rares. How the rare should dominate the screen"
      },
      "svg_effect": {
        "layers": [ layer objects ],
        "target": "single" | "all" | "self",
        "accent_color": "#hex",
        "total_duration_ms": number
      }
    }

    EFFECT TYPES:
    {"type":"damage","value":N}
    {"type":"block","value":N}
    {"type":"aoe_damage","value":N}
    {"type":"apply_status","status":"infection"|"weak"|"vulnerable"|"threads"|"strength"|"charge","value":N,"target":"enemy"|"self"}
    {"type":"draw","value":N}
    {"type":"gain_energy","value":N}
    {"type":"heal","value":N}
    {"type":"self_damage","value":N}
    {"type":"consume_threads","bonus_damage":N}
    {"type":"spend_charge","damage_per_charge":N}

    SVG EFFECT LAYERS:
    Each layer must still use one of the core gameplay-facing stage types:
    {"type":"projectile", ...}
    {"type":"impact", ...}
    {"type":"status_applier", ...}
    {"type":"screen", ...}
    {"type":"aura", ...}

    But inside those layer objects, do NOT think in terms of choosing from a small preset menu.
    Instead, author the effect like a tiny VFX direction sheet using freeform descriptors plus
    numeric controls. The renderer can interpret descriptive words and continuous parameters.

    Common useful fields:
    - "descriptor": short freeform phrase like "comet spear", "splintering moon shard", "coiling storm lash"
    - "primitive": optional short noun for the visual core if it helps
    - "glyph": optional 1-2 character sigil or rune
    - "color": "#hex"
    - "accent_color": "#hex"
    - "size": number
    - "width": number
    - "length": number
    - "count": number
    - "spread": number
    - "thickness": number
    - "opacity": 0.0-1.0
    - "arc_height": number
    - "wobble": number
    - "trail": short freeform phrase describing the residue or wake
    - "timing": {"start_ms":N,"duration_ms":N}

    How layers are used in game:
    - projectile: travels from the player to the chosen target. It must be readable in motion.
    - impact: happens at the hit location and must clearly confirm the strike.
    - status_applier: secondary particles or residue that communicate poison, threads, shock, decay, etc.
    - screen: whole-screen emphasis like flash, vignette, recoil, pulse, or camera violence.
    - aura: energy centered on the player or target.

    Attack choreography guidance:
    - Single-target attacks should usually include both a projectile stage and an impact stage.
    - Think in beats: wind-up → travel → hit → aftermath.
    - The projectile should clearly communicate intent, speed, and class fantasy.
    - The impact should feel forceful and visible enough to confirm the hit instantly.
    - Avoid faint wisps or barely-visible lines; prioritize clarity, violence, and spectacle.
    - Default attack effects to fierce, heavy, and dangerous unless the card fantasy explicitly asks for subtlety.
    - Prefer piercing lances, predatory shards, violent arcs, collapsing bursts, explosive rings,
      jagged fractures, and aggressive residue over soft decorative flourishes.
    - When choosing numeric values, lean upward on size, thickness, contrast, and aftermath density
      so attacks feel like they can actually wound something.
    - Rare attacks should feel like impossible artifacts: stronger anticipation, brighter release,
      heavier aftermath, and more dominant screen presence.
    - Class identity must remain unmistakable:
      plague_doctor effects should feel toxic and contaminating,
      void_weaver effects should feel occult and reality-warping,
      storm_caller effects should feel electrical and violently kinetic.
    - Do not let different classes converge on the same attack choreography with only palette swaps.

    LAYER COUNT: uncommons 2-4 layers, rares 4-6 layers.
    Match class palette, but allow rare cards to push into sharper accent contrast when useful.
    Rare cards should feel singular through choreography, timing, silhouette, and aftermath,
    not just by doing the same thing slightly bigger.
    If unsure, choose the fiercer option.

    BALANCE: uncommons cost 1-2 (8-16 dmg or 10-18 block). Rares cost 2-3 (18-28 dmg or big multi-effects).

    BATCH RULES:
    - Generate a trio with clear contrast. The 3 cards should not all solve the same problem.
    - Vary gameplay role across the batch: e.g. setup, payoff, defense, scaling, AoE, burst, utility.
    - Vary visual feel across the batch: motion rhythm, silhouette, palette emphasis, and texture.
    - Cards must inherit the run's omen, visual_motif, signature_rhythm, and creative_constraint.
    - Rare cards must have a `rarity_signature` and a distinctive `card_frame`.
    - Uncommons should still feel handcrafted, but rares should look and animate like impossible artifacts.

    Write to state_changes: { "variables": { "offered_cards": [ ...3 card objects... ] } }
    Return ONLY the state_changes JSON. No other text.

