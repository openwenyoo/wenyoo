        - {id: "sc_s5", name: "Static Shield", type: "skill", rarity: "basic", cost: 1, description: "Gain 5 Block.", effects: [{type: "block", value: 5}], svg_effect: {layers: [{type: "aura", shape: "shield_shell", color: "#2f7abe", timing: {start_ms: 0, duration_ms: 400}}], target: "self", total_duration_ms: 400}}
        - {id: "sc_c1", name: "Charged Strike", type: "attack", rarity: "common", cost: 1, description: "Deal 5 damage plus 2 per Charge.", effects: [{type: "damage", value: 5}, {type: "spend_charge", damage_per_charge: 2}], svg_effect: {layers: [{type: "projectile", shape: "bolt", trail: "sparks", color: "#84c4fc", timing: {start_ms: 0, duration_ms: 220}}, {type: "impact", shape: "shockwave_ring", spread: 45, color: "#2f7abe", timing: {start_ms: 200, duration_ms: 220}}], target: "single", total_duration_ms: 420}}
