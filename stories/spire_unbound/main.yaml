        - {id: "sc_c8", name: "Galvanize", type: "skill", rarity: "common", cost: 1, description: "Gain 5 Block. Gain 1 Charge.", effects: [{type: "block", value: 5}, {type: "apply_status", status: "charge", value: 1, target: "self"}], svg_effect: {layers: [{type: "aura", shape: "shield_shell", color: "#2f7abe", timing: {start_ms: 0, duration_ms: 350}}, {type: "aura", shape: "charge_glow", color: "#84c4fc", timing: {start_ms: 200, duration_ms: 300}}], target: "self", total_duration_ms: 500}}
      fallback_uncommons:
