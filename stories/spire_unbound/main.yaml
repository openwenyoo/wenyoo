        - {id: "vw_s4", name: "Veil", type: "skill", rarity: "basic", cost: 1, description: "Gain 5 Block.", effects: [{type: "block", value: 5}], svg_effect: {layers: [{type: "aura", shape: "shield_shell", color: "#7b2fbe", timing: {start_ms: 0, duration_ms: 400}}], target: "self", total_duration_ms: 400}}
        - {id: "vw_s5", name: "Veil", type: "skill", rarity: "basic", cost: 1, description: "Gain 5 Block.", effects: [{type: "block", value: 5}], svg_effect: {layers: [{type: "aura", shape: "shield_shell", color: "#7b2fbe", timing: {start_ms: 0, duration_ms: 400}}], target: "self", total_duration_ms: 400}}
