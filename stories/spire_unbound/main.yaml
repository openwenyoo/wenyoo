id: spire_unbound
name: Spire Unbound
title: "Spire Unbound: AI-Native Roguelike Card Game"
description: >
  A Slay-the-Spire-inspired roguelike where your class's uncommon and rare cards
  are uniquely generated by AI for every run. Choose your class, build your deck
  through card rewards, and fight through three floors before facing the Spire Warden.
version: "1.0"
author: Wenyoo Demo
start_node_id: spire_entrance

frontend:
  app:
    mode: sandboxed_app
    app_root: frontend
    entry: index.html
    sandbox:
      - allow-scripts
      - allow-same-origin
    client_type: story_app
    capabilities:
      - local_state
      - deterministic_action
      - architect_action
  client_context:
    representation: card_game_combat
    description: "A roguelike card game where AI generates unique card pools for each run"
    default_guidance: >
      This is a card game UI. Always return structured JSON data via state_changes only.
      No prose narration. The player sees combat, cards, and menus — not a text adventure.
    views:
      card_generation:
        description: "Card pool generation triggered at class selection"
        player_sees: "A loading screen while cards are being generated"
        player_can: "Wait for card generation to complete"
        artifact_guidance: >
          Generate only structured JSON via state_changes. At class selection, produce a
          run_plan. During rewards, produce exactly 3 offered_cards. When generating cards,
          include both the gameplay payload and the card's visual identity metadata.
          Include no prose artifact beyond the requested JSON.
      enemy_generation:
        description: "Enemy doctrine and enemy package generation before the run begins"
        player_sees: "The Spire manifests its defenders before the first floor begins"
        player_can: "Wait for the enemy host to take shape"
        artifact_guidance: >
          Generate only structured JSON via state_changes. First produce enemy_run_theme,
          then produce concrete enemy_configs for floors 1-4. Enemy visuals may include
          bounded handwritten raw SVG fragments for sprite_svg, but they must obey the
          safe tag/attribute boundaries described in the lore prompt.

initial_variables:
  # ── Run State ────────────────────────────────────────────────────────────────
  run_phase: "class_select"
  current_floor: 0
  run_class: null
  player_hp: 0
  player_max_hp: 0
  player_deck: []
  run_plan: null        # generated once at class select (fast, ~5s)
  offered_cards: []     # generated lazily after each fight (3 cards, ~15s)
  enemy_run_theme: null
  enemy_generated_floors: {}
  enemy_generation_ready: false

  # ── Class Configurations ──────────────────────────────────────────────────────
  class_configs:
    plague_doctor:
      name: "Plague Doctor"
      hp: 75
      mechanic: "Infection stacks accumulate on enemies and deal damage equal to stacks at end of each player turn. Stacks never expire."
      vfx_identity: >
        Plague Doctor attacks should feel diseased, invasive, and wet. Favor contaminated needles,
        venomous globes, pressure bursts, miasma blooms, corrosive spits, spreading rot, and residue
        that lingers like infection taking hold. Motion should feel toxic and bodily rather than clean.
      categories:
        venom: "Apply and accelerate Infection stacks on enemies"
        remedy: "Spend your own HP to fuel powerful effects"
        miasma: "AoE effects that spread debuffs to all enemies"
      palette: ["#4a9e4a", "#2d6e2d", "#7bc67b"]
      starting_deck:
        - {id: "pd_s1", name: "Scratch", type: "attack", rarity: "basic", cost: 1, description: "Deal 6 damage.", effects: [{type: "damage", value: 6}], svg_effect: {layers: [{type: "projectile", shape: "needle", trail: "none", color: "#aaaaaa", timing: {start_ms: 0, duration_ms: 220}}, {type: "impact", shape: "radial_burst", spread: 28, color: "#888888", timing: {start_ms: 200, duration_ms: 180}}], target: "single", total_duration_ms: 380}}
        - {id: "pd_s2", name: "Scratch", type: "attack", rarity: "basic", cost: 1, description: "Deal 6 damage.", effects: [{type: "damage", value: 6}], svg_effect: {layers: [{type: "projectile", shape: "needle", trail: "none", color: "#aaaaaa", timing: {start_ms: 0, duration_ms: 220}}, {type: "impact", shape: "radial_burst", spread: 28, color: "#888888", timing: {start_ms: 200, duration_ms: 180}}], target: "single", total_duration_ms: 380}}
        - {id: "pd_s3", name: "Scratch", type: "attack", rarity: "basic", cost: 1, description: "Deal 6 damage.", effects: [{type: "damage", value: 6}], svg_effect: {layers: [{type: "projectile", shape: "needle", trail: "none", color: "#aaaaaa", timing: {start_ms: 0, duration_ms: 220}}, {type: "impact", shape: "radial_burst", spread: 28, color: "#888888", timing: {start_ms: 200, duration_ms: 180}}], target: "single", total_duration_ms: 380}}
        - {id: "pd_s4", name: "Guard", type: "skill", rarity: "basic", cost: 1, description: "Gain 5 Block.", effects: [{type: "block", value: 5}], svg_effect: {layers: [{type: "aura", shape: "shield_shell", color: "#6699cc", timing: {start_ms: 0, duration_ms: 400}}], target: "self", total_duration_ms: 400}}
        - {id: "pd_s5", name: "Guard", type: "skill", rarity: "basic", cost: 1, description: "Gain 5 Block.", effects: [{type: "block", value: 5}], svg_effect: {layers: [{type: "aura", shape: "shield_shell", color: "#6699cc", timing: {start_ms: 0, duration_ms: 400}}], target: "self", total_duration_ms: 400}}
        - {id: "pd_c1", name: "Venom Strike", type: "attack", rarity: "common", cost: 1, description: "Deal 5 damage. Apply 2 Infection.", effects: [{type: "damage", value: 5}, {type: "apply_status", status: "infection", value: 2, target: "enemy"}], svg_effect: {layers: [{type: "projectile", shape: "teardrop", trail: "dissolve", color: "#4a9e4a", timing: {start_ms: 0, duration_ms: 260}}, {type: "status_applier", particle: "drip", repeat: 2, color: "#2d6e2d", timing: {start_ms: 240, duration_ms: 380}}], target: "single", total_duration_ms: 620}}
        - {id: "pd_c2", name: "Toxic Slash", type: "attack", rarity: "common", cost: 1, description: "Deal 8 damage. Apply 1 Infection.", effects: [{type: "damage", value: 8}, {type: "apply_status", status: "infection", value: 1, target: "enemy"}], svg_effect: {layers: [{type: "projectile", shape: "needle", trail: "none", color: "#7bc67b", timing: {start_ms: 0, duration_ms: 200}}, {type: "impact", shape: "splatter", spread: 35, color: "#4a9e4a", timing: {start_ms: 180, duration_ms: 220}}], target: "single", total_duration_ms: 400}}
        - {id: "pd_c3", name: "Miasma Cloud", type: "skill", rarity: "common", cost: 1, description: "Deal 4 damage to ALL enemies. Apply 1 Weak to all.", effects: [{type: "aoe_damage", value: 4}, {type: "apply_status", status: "weak", value: 1, target: "enemy"}], svg_effect: {layers: [{type: "impact", shape: "shockwave_ring", spread: 80, color: "#4a9e4a", timing: {start_ms: 0, duration_ms: 300}}, {type: "status_applier", particle: "drip", repeat: 3, color: "#2d6e2d", timing: {start_ms: 100, duration_ms: 400}}], target: "all", total_duration_ms: 500}}
        - {id: "pd_c4", name: "Inoculate", type: "skill", rarity: "common", cost: 1, description: "Gain 8 Block.", effects: [{type: "block", value: 8}], svg_effect: {layers: [{type: "aura", shape: "shield_shell", color: "#4a9e4a", timing: {start_ms: 0, duration_ms: 420}}], target: "self", total_duration_ms: 420}}
        - {id: "pd_c5", name: "Plague Breath", type: "attack", rarity: "common", cost: 2, description: "Deal 12 damage. Apply 3 Infection.", effects: [{type: "damage", value: 12}, {type: "apply_status", status: "infection", value: 3, target: "enemy"}], svg_effect: {layers: [{type: "projectile", shape: "orb", trail: "smoke", color: "#2d6e2d", timing: {start_ms: 0, duration_ms: 280}}, {type: "impact", shape: "radial_burst", spread: 45, color: "#4a9e4a", timing: {start_ms: 260, duration_ms: 200}}, {type: "status_applier", particle: "drip", repeat: 3, color: "#7bc67b", timing: {start_ms: 300, duration_ms: 450}}], target: "single", total_duration_ms: 750}}
        - {id: "pd_c6", name: "Weaken", type: "skill", rarity: "common", cost: 1, description: "Apply 2 Weak and 1 Vulnerable to an enemy.", effects: [{type: "apply_status", status: "weak", value: 2, target: "enemy"}, {type: "apply_status", status: "vulnerable", value: 1, target: "enemy"}], svg_effect: {layers: [{type: "projectile", shape: "rune", trail: "dissolve", color: "#7bc67b", timing: {start_ms: 0, duration_ms: 250}}, {type: "status_applier", particle: "tendril", repeat: 2, color: "#4a9e4a", timing: {start_ms: 230, duration_ms: 360}}], target: "single", total_duration_ms: 590}}
        - {id: "pd_c7", name: "Virulence", type: "power", rarity: "common", cost: 1, description: "At the start of each turn, apply 1 Infection to all enemies.", effects: [{type: "apply_status", status: "infection", value: 1, target: "enemy"}], svg_effect: {layers: [{type: "aura", shape: "pulse_ring", color: "#4a9e4a", timing: {start_ms: 0, duration_ms: 500}}], target: "self", total_duration_ms: 500}}
        - {id: "pd_c8", name: "Tonic", type: "skill", rarity: "common", cost: 1, description: "Spend 4 HP. Gain 10 Block and draw 1 card.", effects: [{type: "self_damage", value: 4}, {type: "block", value: 10}, {type: "draw", value: 1}], svg_effect: {layers: [{type: "aura", shape: "shield_shell", color: "#7bc67b", timing: {start_ms: 0, duration_ms: 400}}, {type: "screen", effect: "flash", color: "#2d6e2d", timing: {start_ms: 0, duration_ms: 200}}], target: "self", total_duration_ms: 450}}
      fallback_uncommons:
        - {id: "pd_fb1", name: "Epidemic", type: "attack", rarity: "uncommon", cost: 2, description: "Deal 10 damage. Apply 4 Infection.", effects: [{type: "damage", value: 10}, {type: "apply_status", status: "infection", value: 4, target: "enemy"}], svg_effect: {layers: [{type: "projectile", shape: "orb", trail: "dissolve", color: "#4a9e4a", timing: {start_ms: 0, duration_ms: 270}}, {type: "impact", shape: "splatter", spread: 50, color: "#2d6e2d", timing: {start_ms: 250, duration_ms: 200}}, {type: "status_applier", particle: "drip", repeat: 4, color: "#7bc67b", timing: {start_ms: 300, duration_ms: 500}}], target: "single", total_duration_ms: 800}}
