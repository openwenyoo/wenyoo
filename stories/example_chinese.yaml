  cave_entrance:
    isStartNode: false
    id: cave_entrance
    name: 洞穴入口
    definition: '【State Conditions】

      ## 当玩家有 giant 状态时：

      - 洞穴入口对你来说显得非常狭窄，你需要蹲下甚至爬行才能进入

      - 那扇木门在你面前显得脆弱不堪，像一张薄纸

      - 石匾只到你的脚踝位置，你必须俯下身才能看清上面的文字

      - 你的巨大身躯挡住了洞口的光线，让洞穴内更加漆黑

      - 蝙蝠被你的到来惊得四散飞出


      ## 当玩家有 hallucinating 状态时：

      - 洞穴入口似乎在缓慢收缩和扩张，仿佛一个活物的嘴巴

      - 石匾上的符号发出微弱的红光，像是活着的文字

      - 从洞穴深处涌出的空气中夹杂着隐约的低语和叹息

      - 藤蔓像触手一样缓慢蠕动，似乎想要抓住什么

      - 岩石表面的苔藓呈现出不自然的色彩，在黑暗中发出诡异的荧光


      【出口】

      - go_south → clearing（阳光空地）

      - 穿过木门进入洞穴 → treasure_room（宝藏室）（由 cave_door 物体交互触发，需要门已解锁）

      '
    explicit_state: '你来到了一个被茂密植被环绕、几乎完全隐藏的洞穴入口。厚重的藤蔓像帘幕一样垂挂在洞口，苔藓覆盖了岩石表面，使整个入口看起来古老而神秘，仿佛已经沉睡了数百年。从洞穴深处不断涌出凉爽的空气，带着潮湿的泥土气息和隐约的矿物味道，让你感到一丝寒意。在洞穴入口的右侧，半掩在蕨类植物后面，你注意到一块{stone_tablet:
      古老石匾}，上面刻着风化的符号。洞口被一扇{cave_door: 古老的木门}部分阻挡。透过门缝，你只能看到漆黑一片，偶尔有蝙蝠的翅膀扑腾声从黑暗中传来。'
    objects:
    - id: cave_door
      name: 木门
      definition: '【描述】

        洞穴入口被一扇{cave_door: 木门}部分阻挡，门上挂着一个生锈的挂锁。


        【交互规则】

        ## 检查门和挂锁

        玩家检查时，说明这扇木门虽然陈旧却仍很结实，被挂锁固定住，需要一把匹配的钥匙。


        ## 用银钥匙打开挂锁

        当玩家执行此操作时（需要背包中有银钥匙）：
        - 描写银钥匙与挂锁完美契合、咔嗒一声打开。
        - 这应视为 `cave_door` 带上 `unlocked` 状态，并把它的可见状态改成“洞穴入口的木门已经解锁，可以推开进入洞穴深处。”


        ## 破门而入

        当玩家执行此操作时（需要玩家有 giant 状态）：
        - 描写玩家凭借暴涨的力量砸碎木门。
        - 这应视为 `cave_door` 同时带上 `unlocked` 与 `broken` 状态，并把玩家带到 `treasure_room`。


        ## 打开门

        当玩家尝试打开门时：
        - 如果门已解锁（status 包含 `unlocked`），描写玩家推门进入，并把玩家带到 `treasure_room`。
        - 如果门未解锁，说明门被挂锁锁着，无法打开，必须先找到钥匙。


        ## 进入洞穴

        当玩家尝试进入洞穴时：
        - 如果门已解锁（status 包含 `unlocked`），描写玩家推门进入，并把玩家带到 `treasure_room`。
        - 如果门未解锁，说明木门仍挡住去路，必须先把门打开。'
      explicit_state: '洞穴入口被一扇{cave_door: 木门}部分阻挡，门上挂着一个生锈的挂锁。'
      implicit_state: ''
      properties:
        status: []
    - id: stone_tablet
      name: 石匾
      definition: '【描述】

        洞穴入口旁的石匾上刻着古老符号，看起来像是某种警告或指示。


        【交互规则】

        ## 检查石匾

        - 描写玩家辨认石匾上的古老符号，并意识到其中提到了宝藏、门锁，以及一把能够开启前路的银钥匙。
        - 这应视为石匾已经 `examined`，并记下 `tablet_examined`。'
      explicit_state: 洞穴入口旁的石匾上刻着古老的符号，看起来像是某种警告或指示。
      implicit_state: ''
      properties:
        status: []
