  treasure_room:
    isStartNode: false
    id: treasure_room
    name: 宝藏室
    definition: '【State Conditions】

      ## 当玩家有 giant 状态时：

      - 宝藏室的天花板低矮，你必须弯腰甚至半蹲才能站在里面

      - 石台和宝箱看起来小巧精致，你一只手就能拎起整个宝箱

      - 墙壁上的火把只到你腰部位置，照亮你的下半身

      - 你庞大的身躯几乎填满了整个房间，转身都困难

      - 铭文在你脚边，你必须趴下才能阅读


      ## 当玩家有 hallucinating 状态时：

      - 宝箱上的宝石发出脉动的光芒，像是活着的心脏在跳动

      - 墙壁上的铭文在火光中不断变化，写出不同的警告

      - 火把的火焰呈现出不自然的蓝紫色

      - 石台似乎在缓慢旋转，宝箱的位置看起来不断移动

      - 你隐约听到远古的声音在耳边回响，是诅咒还是祝福难以分辨


      【交互规则】

      ## 检查宝藏室

      当玩家环顾四周或细看墙壁时，展示铭文：
      "此乃阿尔德里克国王之遗产，贪婪者将受诅咒，谦逊者将得祝福，弃财者将获真知。愿进入此室者，三思而后行。"
      并记下 `read_room_inscription`。

      '
    explicit_state: '你终于到达了传说中的宝藏室！房间中央是一个古老的石台，上面放着一个华丽的{treasure_chest: 宝箱}。宝箱上镶嵌着宝石，在微弱的光线中闪闪发光。墙壁上的火把自动点燃，照亮了整个房间。你感到一种成就感涌上心头，冒险终于到达了终点。'
    triggers: []
    objects:
    - id: treasure_chest
      name: 宝箱
      definition: '【描述】

        一个华丽宝箱放在石台中央，镶着宝石与金属花纹，盖子并没有上锁。


        【交互规则】

        ## 打开宝箱

        当玩家执行此操作时：
        - 描写宝箱开启后金币、珠宝与古老金杯显露出来。
        - 这应视为 `treasure_chest` 已经 `opened`，玩家已经得到宝藏并记下 `has_treasure`。
        - 同时让 `golden_coin` 与 `golden_goblet` 作为掉落物出现。
        - 紧接着描写房间深处传来轰鸣、`glowing_door` 在墙后显现，并让它带上 `visible` 状态。'
      explicit_state: 一个华丽的宝箱放在石台中央，镶嵌着各种宝石，看起来非常珍贵。
      implicit_state: ''
      properties:
        status: []
    - id: golden_coin
      name: 金币
      definition: '【描述】

        小而闪亮的金币上刻着古老王室的徽章。它也许不只值钱，更像是这座宝藏曾真实存在过的证明。'
      explicit_state: 小而闪亮的金币上刻着古老王室的徽章。它也许不只值钱，更像是这座宝藏曾真实存在过的证明。
      implicit_state: ''
