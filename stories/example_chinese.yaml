    affinity: 60
    location: hidden_grove
nodes:
  forest_path:
    isStartNode: true
    id: forest_path
    name: 森林小径
    definition: '【State Conditions】

      ## 当玩家有 giant 状态时：

      - 原本高大的橡树和松树现在只到你的胸口，你的脑袋穿过了树冠，阳光直射你的脸

      - 小径窄得你的双脚几乎踩不进去，每一步都压碎地上的灌木和小石头

      - 旧路标看起来像一个微型玩具，你可以轻松踩碎它

      - 地面在你的重压下微微颤抖，周围的小动物四散逃窜

      - 你必须拨开树冠才能看到前方的路


      ## 当玩家有 hallucinating 状态时：

      - 树木的轮廓不时扭曲，仿佛在缓慢地呼吸

      - 蘑菇散落的孢子变成了闪烁的金色萤火虫，在空气中旋转

      - 路标上的文字似乎在缓慢移动和变化，有时拼出陌生的词句

      - 远处的鸟鸣听起来像低沉的人语，似乎在窃窃私语

      - 所有色彩变得过于鲜艳，不太真实，地面的苔藓闪烁着荧光


      【出口】

      - go_north → !goto: deep_forest（深林）

      - go_east → !goto: clearing（阳光空地）

      '
    explicit_state: '你站在一条蜿蜒穿过古老而茂密森林的狭窄小径上。高大的橡树和松树耸立在你上方，它们的枝叶交织成厚厚的树冠，将阳光过滤成斑驳的金色图案洒在覆盖着落叶和苔藓的地面上。空气中弥漫着泥土和松针的清新气息，远处传来鸟儿的歌唱和树叶的沙沙声。{向北:
      深入森林}，小径蜿蜒深入更幽暗的树林，似乎隐藏着未知的秘密。{向东: 前往空地}，透过树木，你瞥见一个阳光普照的小空地，那里或许有值得探索的东西。在小径边上，你注意到一个{strange_mushroom:
      奇怪的蘑菇}和一个{old_signpost: 旧路标}。'
    objects:
    - id: strange_mushroom
      name: 奇怪的蘑菇
      definition: '【外观】

        一个鲜红色、带着白斑的奇异蘑菇生在路边，伞帽边缘泛着不自然的微光， 还散出若有若无的甜香。它看起来很诱人，但直觉告诉人最好别轻易入口。

        这种蘑菇带有明显魔力。吃下后会让身体膨胀、力量增强，同时伴随幻觉； 若想恢复正常，需要找到治愈草药。


        【交互规则】

        ## 检查蘑菇

        玩家查看它时，着重描写荧光、甜香与隐约危险感，并记下玩家已经检查过它（`mushroom_examined`）。


        ## 采摘蘑菇

        玩家采下它时，写出蘑菇在掌心轻轻颤动、像是活物般蓄着魔力。
        这应视为 `strange_mushroom` 进入玩家背包、原地只剩一个小坑、蘑菇带上 `taken` 状态，并记下 `mushroom_taken`。


        ## 吃掉蘑菇

        玩家吃下它时，描写身体迅速变大、感官扭曲、色彩失真的体验，并明确暗示必须用治愈草药才能恢复正常。
        吃下后，`strange_mushroom` 应从玩家背包中消失，并被视为已经 `eaten` 且 `hidden`。
        玩家应进入 `giant`、`strong`、`hallucinating` 状态，同时记下 `player_is_big = true` 与 `player_hallucinating = true`。

        '
      explicit_state: 一个带有鲜红色帽和白色斑点的奇怪的蘑菇生长在你脚边，看起来既诱人又危险。
      implicit_state: ''
      properties:
        status: []
    - id: old_signpost
      name: 旧路标
      definition: |
        【外观】
        一个风化严重的旧木路标斜立在小径旁，木头发灰开裂，却还勉强保持着原样。
        上面刻着褪色的文字："欢迎来到神秘森林。向北森林深处，向东阳光空地。小心蘑菇的诱惑！"

        【交互规则】
        ## 阅读路标
        玩家查看路标时，完整展示文字内容，并突出最后一句警告的不祥意味，同时记下 `sign_read`。

        ## 破坏路标
        当玩家尝试推倒或破坏路标时：
        - 若玩家没有 giant 状态，说明普通人的力气不足以彻底毁掉它。
        - 若玩家有 giant 状态，描述木头在巨力下碎裂、字迹再也无法辨认，并把路标视为 `destroyed`，其可见状态变成只剩散落木头碎片。
      explicit_state: 一个风化的旧路标矗立在小径旁，上面刻着褪色的文字。
      implicit_state: ''
      properties:
        status: []
    actions: []
    characters: []
    triggers: []
  deep_forest:
    isStartNode: false
    id: deep_forest
    name: 深林
    definition: '【State Conditions】

      ## 当玩家有 giant 状态时：

      - 曾经阴暗压抑的深林现在感觉开阔了许多——你的头顶已经高于大部分树冠

      - 那棵"巨大的"倒下的树现在只到你膝盖高度，根本不是障碍

      - 猴子在你面前显得极其渺小，像一只手掌大的小玩偶

      - 你沉重的脚步踩碎枯枝和藤蔓，发出阵阵巨响

      - 鸟群和小动物在你到来时惊慌逃散


      ## 当玩家有 hallucinating 状态时：

      - 发光的苔藓变得极其明亮，在黑暗中织出流动的光河

      - 古老的符文似乎在岩石上浮动、旋转，拼出不断变化的预言

      - 树木的影子扭曲成各种奇异的形状，像是潜伏的生物

      - 水滴声变成了有节奏的低语，仿佛森林在对你说话

      - 倒下的树干上的苔藓和真菌闪烁着迷幻的色彩


      【出口】

      - go_south → forest_path（森林小径）

      - 爬过/跨过倒下的树 → cave_entrance（洞穴入口）（由 fallen_tree 物体交互触发）

      '
    explicit_state: '深入森林，这里变得更加阴暗和茂密，仿佛进入了另一个世界。厚厚的树冠几乎将天空完全遮蔽，只有零星的光线像细小的金线般洒落。小径几乎被厚厚的落叶和纠缠的藤蔓覆盖，踩上去发出柔软的沙沙声。空气凉爽而潮湿，带着浓郁的泥土、苔藓和腐烂植物的复合气息。你听到从四面八方传来的森林交响曲：树叶的窸窣、遥远的鸟鸣、树枝的吱嘎，以及某处传来的水滴轻敲石头的声音。挡在你面前的是一棵巨大的{fallen_tree:
      倒下的树}，上面栖息了{@clever_monkey: 聪明的小猴子}。树下的岩石上刻着一些{ancient_runes: 古老的符文}，旁边生长着一片{glowing_moss: 发光的苔藓}。{爬过树:
      爬过倒下的树继续前进}可以继续前进。'
    objects:
    - id: fallen_tree
      name: 倒下的树
      definition: '【描述】

        一棵巨木横倒在前方，粗糙的树皮上覆着苔藓和真菌，像一道天然栅栏。


        【交互规则】

        ## 爬过倒下的树

        正常情况下，描写玩家手脚并用翻过树干，随后继续前进，并把玩家带到 `cave_entrance`。


        ## 搜索倒下的树

        玩家搜索树干时，只找到虫子和旧硬币之类的零碎痕迹，没有真正的收获，并记下 `tree_searched`。


        ## 当玩家是巨人时推开/踢开/跨过倒下的树

        玩家有 giant 状态时，把这棵树写成几乎不成障碍的小木桩；可以一脚踢开，也可以直接大步跨过去，突出体型反差与力量感，并把玩家带到 `cave_entrance`。'
      explicit_state: 一棵巨大的倒下的树挡住了前面的路，它的树干覆盖着苔藓和真菌，看起来已经倒下多年。
      implicit_state: ''
      properties:
        status: []
    - id: ancient_runes
      name: 古老的符文
      definition: '【描述】

        一些古老的符文刻在附近的岩石上，覆盖着藤蔓。


        【交互规则】

        ## 检查古老的符文

        玩家查看符文时，说明这像是某种古老语言，内容与隐藏宝藏及“钥匙开启命运之门”有关，并记下 `runes_examined`。'
      explicit_state: 一些古老的符文刻在附近的岩石上，覆盖着藤蔓。
      implicit_state: ''
      properties:
        status: []
    - id: glowing_moss
      name: 发光的苔藓
      definition: '【描述】

        一片淡绿色发光的苔藓附着在潮湿的岩石上，散发着柔和的微光。


        【交互规则】

        ## 检查发光的苔藓

        玩家触摸或观察它时，描写柔软湿润的触感，以及微光像在指尖轻轻流动。 这种苔藓像是吸收了森林里的残余魔力。'
      explicit_state: 一片淡绿色发光的苔藓附着在潮湿的岩石上，散发着柔和的微光。
      implicit_state: ''
      properties:
        status: []
    actions: []
    characters: []
    triggers: []
  clearing:
    isStartNode: false
    id: clearing
    name: 阳光空地
    definition: '【场景】

      这是一片被阳光照亮的小空地，草地柔软，野花盛开，空气里满是暖意与花香。 这里的气氛应当显得安宁、开阔，是森林中少见的休息之处。

      只描述玩家眼前能看见的东西，不要主动泄露隐藏小径或其他秘密。

      【可见事物】

      - {stone_well: 石井}：空地中央的古老石井 - {butterfly_net: 捕蝶网}：散落在地上的捕蝶工具 - {healing_herbs: 治愈草药}：长在边缘的翠绿草药
      - {lush_vines: 藤蔓}：覆盖空地边缘的浓密藤蔓

      【出口】

      - go_west → forest_path（森林小径） - go_northwest → hidden_grove（隐秘林地）（需要 found_hidden_path = true）

      【交互规则】

      ## 在空地休息

      玩家休息时，描写阳光、微风与花香让人慢慢放松、精神恢复，并记下 `player_rested`。

      【状态修正】

      ## 当玩家有 giant 状态时：

      - 空地突然显得很小，你几步就能走到头

      - 石井看起来像一个小水桶，你可以直接伸手探入井底

      - 野花在你巨大的脚下被无情踩踏，蝴蝶纷纷逃离你的阴影

      - 捕蝶网对于你现在的巨手来说小得可笑，根本无法使用

      - 你的每一步都在草地上留下深深的脚印

      - 治愈草药看起来小如指甲，需要极其小心才能采摘


      ## 当玩家有 hallucinating 状态时：

      - 野花的色彩变得过于浓烈，仿佛在燃烧

      - 蝴蝶的翅膀上出现了不存在的文字和符号

      - 井水的倒影中似乎映出了另一个世界

      - 阳光有时变成液态的金色，从天空倾泻而下

      - 草药散发出异常强烈的香气，让你分不清是真实还是幻觉

      '
    explicit_state: null
    implicit_state: 井中藏着通往宝藏的银钥匙，藤蔓后隐藏着通往隐秘林地的小径
    objects:
    - id: stone_well
      name: 石井
      definition: '【描述】

        空地中央矗立着一口古老石井，井沿布满苔藓与藤蔓，旁边挂着一只破旧木桶。


        【交互规则】

        ## 检查古老的石井

        玩家细看时，写出井壁的风化痕迹、木桶的磨损，以及井底泉水边那把隐隐闪光的 **{silver_key: 银钥匙}**。
        这应视为石井已经被检查过，记下 `well_examined`；同时让 `silver_key` 处于 `in_well` 与 `visible` 状态。


        ## 当玩家是巨人时取钥匙

        玩家有 giant 状态时，石井只像个小水桶。描写他们笨拙地在井里摸索，差点把钥匙碰开，最后才小心地把它捏起来。
        这应视为 `silver_key` 进入玩家背包，钥匙带上 `taken` 与 `hidden` 状态，并记下 `has_silver_key` 与 `well_examined`。'
      explicit_state: 空地中央矗立着一口古老的石井，井沿上爬满藤蔓。
      implicit_state: ''
      properties:
        status: []
    - id: butterfly_net
      name: 捕蝶网
      definition: '【描述】

        一个轻巧的捕蝶网落在草地上，细长木柄末端连着精致的网袋。


        【交互规则】

        ## 拿起捕蝶网

        玩家拾起它时，描写木柄轻巧却结实，拿在手里刚好适合追逐低飞的蝴蝶。
        这应视为 `butterfly_net` 进入玩家背包，并带上 `taken` 与 `hidden` 状态。


        ## 用捕蝶网抓蝴蝶

        玩家挥网时，描写捕蝶网兜住一只美丽的蓝色蝴蝶，它在手中轻轻拍打翅膀。
        这应视为 `blue_butterfly` 进入玩家背包，并记下 `butterfly_caught`；不要重复给玩家新增第二个 `butterfly_net`。


        ## 当玩家是巨人时

        玩家有 giant 状态时，捕蝶网在手里像玩具。写出动作笨拙、蝴蝶四散、 木柄吱呀作响的窘态；不要触发 butterfly_caught 效果。 如果玩家反复硬试，可以把网写坏。'
      explicit_state: 一个轻巧的捕蝶网，细长的木柄上连着精致的网袋，看起来很适合捕捉飞行中的昆虫。
      implicit_state: ''
      properties:
        status: []
    - id: blue_butterfly
      name: 蓝色蝴蝶
      definition: '【描述】

        一只美丽的蓝色蝴蝶，翅膀上有精致的花纹，闪烁着宝石般的光泽。


        【交互规则】

        ## 观察蝴蝶

        玩家看它时，突出翅膀的宝石光泽与轻轻拍动时的脆弱美感。


        ## 放飞蝴蝶

        玩家想放飞它时，描写蝴蝶挣脱手心、重新飞入阳光的轻盈一刻。
        这应视为 `blue_butterfly` 离开玩家背包，并把 `butterfly_caught` 改回 false。

        '
      explicit_state: 一只蓝色蝴蝶在你手中轻轻拍打着翅膀。
      implicit_state: 可以与隐士交换得到有价值的东西
      properties:
        status:
        - hidden
    - id: healing_herbs
      name: 治愈草药
      definition: '【描述】

        一簇翠绿草药长在空地边缘，心形叶片上带着清新的草木气息。


        【交互规则】

        ## 采摘治愈草药

        玩家采摘时，描写叶面冰凉柔软、香气清新醒神，像是能驱散体内的异样魔力。
        这应视为 `healing_herbs` 进入玩家背包，并带上 `taken` 与 `hidden` 状态。


        ## 检查草药

        玩家检查时，描写心形叶片、细小锯齿与稳定身体和心神的药性，并记下 `herbs_examined`。


        ## 使用治愈草药

        玩家使用草药时，描写苦涩汁液扩散、眩晕与幻象像潮水一样退去、失控变化逐渐平息。
        这应视为 `healing_herbs` 从背包中消失，并把 `player_hallucinating` 与 `player_is_big` 改回 false。


        ## 当玩家是巨人时采摘草药

        玩家有 giant 状态时，把采药写得笨拙又紧张：他们必须俯身细找，几次险些把叶子捏烂，但最终还是成功采到。
        机械结果与正常采摘相同：`healing_herbs` 进入背包，并带上 `taken` 与 `hidden` 状态。


        ## 当玩家是巨人时使用草药

        玩家有 giant 状态时，重点描写苦味、身体回缩、视角下降、树木重新变高，以及幻觉一点点散去的强烈反差。
        这应视为 `healing_herbs` 从背包中消失，`player_hallucinating` 与 `player_is_big` 改回 false，
        同时移除玩家的 `giant`、`strong`、`hallucinating` 状态，并把玩家可见状态改写为“你恢复了正常的体型，头脑也变得清醒。森林重新变得高大而神秘，世界恢复了真实的色彩。”'
      explicit_state: 一簇翠绿的草药生长在空地的边缘，叶子呈心形，散发着淡淡的清香。
      implicit_state: ''
      properties:
        status: []
    - id: silver_key
      name: 银钥匙
      definition: '【描述】

        这是一把古老的银钥匙，表面仍保留着细微光泽，显然并非凡物。 若它还在井里，应把它描写成躺在清澈泉水中的一抹银光； 若已被取走，则把它描写成一把可握在掌心的旧钥匙。


        【交互规则】

        ## 取出银钥匙

        玩家取出它时，描写冰凉的金属落入掌心的实感。
        这应视为 `silver_key` 进入玩家背包，钥匙带上 `taken` 与 `hidden` 状态，并记下 `has_silver_key`。'
      explicit_state: ''
      implicit_state: ''
      properties:
        status:
        - hidden
    - id: lush_vines
      name: 浓密的藤蔓
      definition: '【描述】

        绿油油的藤蔓沿着岩壁与树干一路蔓生，把空地边缘遮得很严实。


        【交互规则】

        ## 检查藤蔓

        玩家检查时，描写西北角那片凌乱叶影以及拨开后露出的隐秘小径。
        这应视为 `found_hidden_path = true`，藤蔓带上 `searched` 状态，且它的可见状态改成“藤蔓被拨开后，在西北角露出了一条{go_northwest: 隐秘的小径}，通往森林深处。”


        ## 当玩家是巨人时撕开藤蔓

        玩家有 giant 状态时，把藤蔓写得像轻易就能扯碎的薄网，突出汁液四溅与植被被强行撕开的压迫感。
        这同样应视为 `found_hidden_path = true`；藤蔓带上 `searched` 与 `destroyed` 状态，并把可见状态改成“藤蔓被巨力撕碎，在西北角露出了一条{go_northwest: 隐秘的小径}，通往森林深处。碎裂的藤蔓残骸散落一地。”'
      explicit_state: 绿油油的藤蔓攀爬在空地的岩壁和树木上，把四周封得严严实实。
      implicit_state: 藤蔓后隐藏着通往隐秘林地的小径
      properties:
        status: []
    actions: []
    characters: []
    triggers: []
  hidden_grove:
    isStartNode: false
    id: hidden_grove
    name: 隐秘林地
    definition: '【State Conditions】

      ## 当玩家有 giant 状态时：

      - 隐秘林地对你来说狭小局促，你必须弯腰才能不被树枝刮到

      - 隐士的小屋看起来像一个脆弱的鸟巢，你一不小心就可能踩塌它

      - 你沉重的脚步震动地面，散落的植物和符文石被震得跳起

      - 小鹿在你到来的一瞬间警觉地后退

      - 隐士抬头看到你的巨大身影时，脸上闪过惊讶和忧虑


      ## 当玩家有 hallucinating 状态时：

      - 隐士身周笼罩着一层淡淡的金色光环，看起来像是神灵

      - 小鹿的眼睛闪烁着星辰般的光芒，仿佛能看穿你的灵魂

      - 古老的卷轴上的文字在空气中浮起，形成流动的光带

      - 小屋似乎在缓慢地呼吸，藤蔓像血管一样搏动

      - 符文石发出低沉的嗡鸣，仿佛在吟唱远古的咒语


      【出口】

      - go_southeast → clearing（阳光空地）

      '
    explicit_state: '穿过茂密的藤蔓，你来到一片与世隔绝的隐秘林地。这里异常宁静，阳光透过树叶的缝隙洒下柔和的光线，照亮了一座用树枝和藤蔓搭建的简朴小屋。小屋前坐着一位{@forest_hermit:
      白发苍苍的老人}，他正在专注地研究一些古老的卷轴。空气中弥漫着草药和木烟的混合气息，地上散落着各种采集来的植物和奇怪的符文石。一只温顺的{@mystic_deer: 小鹿}在小屋旁静静地吃草。{向东南:
      返回空地}可以返回阳光空地。'
    objects:
    - id: ancient_map
