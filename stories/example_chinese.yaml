    - id: golden_goblet
      name: 古老的金杯
      definition: '【描述】

        雕刻精美的金杯上布满复杂纹饰，杯口略有磨损，看得出它曾属于某位身份显赫的人。'
      explicit_state: 雕刻精美的金杯上布满复杂纹饰，杯口略有磨损，看得出它曾属于某位身份显赫的人。
      implicit_state: ''
      properties:
        status:
        - hidden
    - id: guardian_badge
      name: 森林守护者徽章
      definition: '【描述】

        一枚精致的徽章，由活生生的藤蔓和发光的琥珀制成。它象征着森林守护者的崇高地位，散发着自然的祝福之力。'
      explicit_state: 一枚精致的徽章，由活生生的藤蔓和发光的琥珀制成。它象征着森林守护者的崇高地位，散发着自然的祝福之力。
      implicit_state: ''
      properties:
        status:
        - hidden
    - id: glowing_door
      name: 发光之门
      definition: '【描述】

        一扇散发着光芒的石门出现在房间深处。

        门上的符文闪烁着，仿佛在召唤你离开这里。

        这似乎是离开宝藏室的唯一方法。

        门的颜色会根据玩家的行为而变化——金色代表祝福，暗红色代表诅咒。


        【交互规则】

        ## 观察/检查发光之门

        根据玩家状态描述门的颜色：

        - 如果 player_hallucinating 为 true：门散发着扭曲的暗红色光芒，符文像是在嘲笑

        - 如果 traded_butterfly 为 true 且 learned_curse 为 true：门散发着温暖的金色光芒，符文闪烁着祝福

        - 其他情况：门散发着普通的白色光芒


        ## 穿过发光之门/离开/通过门

        根据以下条件判断结局（按优先级从高到低）：


        ### 诅咒结局（ending_cursed）

        条件：player_hallucinating 为 true（吃了蘑菇）

        - 描述：你带着贪婪和混乱的心穿过石门。但当光芒散去时，你发现自己仍在原地。

        - 描述：你的双手空空如也——所有宝藏都化为了灰烬。蘑菇的幻觉让你看不清真实，而你的贪婪触发了阿尔德里克国王的诅咒。

        - 描述：你跌坐在地，意识到自己失去了一切。传说中，贪婪者将受诅咒——如今你明白了这句话的含义。
        - 将其收束为【诅咒结局】；记下 `ending_cursed` 与 `adventure_complete`。


        ### 守护者结局（ending_guardian）- 最佳结局

        条件：traded_butterfly 为 true 且 learned_curse 为 true 且 learned_hermit_story 为 true

        - 描述：你带着对森林的理解和敬意穿过石门。温暖的金光包围着你。

        - 描述：当你睁开眼睛，发现自己站在森林入口。但你的身上多了一样东西——森林守护者的徽章。

        - 描述：隐士的声音在耳边回响："你选择了智慧而非贪婪，选择了分享而非独占。从今往后，你就是这片森林新的守护者。"
        - 描述：你感受到森林的祝福流入体内，成为这片土地的一部分。
        - 这应视为 `guardian_badge` 进入玩家手中，并收束为【守护者结局】；记下 `ending_guardian` 与 `adventure_complete`。


        ### 荣誉结局（ending_honorable）- 好结局

        条件：learned_curse 为 true（从隐士那里学到了诅咒的知识）

        - 描述：你带着对诅咒的了解穿过石门。光芒柔和而温暖。

        - 描述：当光芒散去，你发现自己回到了森林入口，手中的宝藏完好无损。

        - 描述：你听到隐士的话语回响："懂得敬畏的人，将获得真正的财富。"
        - 描述：你不仅带走了宝藏，更带走了智慧。这次冒险让你成为更好的人。
        - 将其收束为【荣誉结局】；记下 `ending_honorable` 与 `adventure_complete`。


        ### 普通结局（ending_standard）- 中性结局

        条件：其他所有情况

        - 描述：你穿过石门，白光闪烁。

        - 描述：当你睁开眼睛，发现自己站在森林入口，手中握着从宝藏室取得的财宝。
        - 描述：你完成了冒险，获得了宝藏。但你总觉得错过了什么——也许这片森林还有更多秘密等待发掘。
        - 将其收束为【普通结局】；记下 `ending_standard` 与 `adventure_complete`。

        '
      explicit_state: 一扇散发着神秘光芒的石门，门上的符文闪烁着，等待着你做出最终的选择。
      implicit_state: 穿过此门将根据你的行为决定结局——诅咒、普通、荣誉或守护者
      properties:
        status:
        - hidden
