id: example_adventure_chinese
title: 神秘森林冒险
name: 神秘森林冒险
author: 文字冒险引擎
description: 这是一个展示文字冒险引擎功能的丰富示例冒险。你将探索一个神秘的森林，充满奇异的生物、隐藏的宝藏和需要解决的谜题。从一条蜿蜒的小径开始，你的旅程将带你深入茂密的树林，遇到各种挑战，并最终发现传说中的宝藏。准备好你的智慧和勇气吧！
version: '1.1'
difficulty: 中等
estimated_playtime: 30-45 分钟
start_node_id: forest_path
initial_variables:
  lore_character_perspective: '角色视角 —— 身体状态如何改变感知 ## 通用原则 在描述场景之前，检查玩家的状态标签。 如果玩家有 "giant" 状态，所有描写必须从巨人的高视角呈现。
    如果玩家有 "hallucinating" 状态，感官描写应混入幻觉元素。 两种状态可以同时存在，此时同时应用巨人视角和幻觉效果。

    ## 巨人视角（giant 状态） 世界变得渺小。树木只到你胸口，小径窄得像羊肠小道， 你每一步都震动大地。你俯视一切——树冠、动物、建筑。 普通物体显得脆弱易碎。门框需要弯腰甚至无法通过。 你的脚步声如雷鸣，惊飞周围的鸟群。
    力量感充盈全身，但精细动作变得困难。

    ## 幻觉视角（hallucinating 状态） 色彩变得异常鲜艳，树叶闪烁着不真实的荧光。 空气中漂浮着不存在的光点和形状。 声音时远时近，偶尔听到低语或歌声。 偶尔看到物体边缘扭曲、变形。
    无法完全分辨真实与幻象。

    ## 正常视角（无特殊状态）

    以普通人类冒险者的视角描写，感官正常。

    '
  player_hallucinating: false
  player_is_big: false
